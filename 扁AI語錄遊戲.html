<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扁 AI 語錄 — 30秒限時拳擊挑戰</title>
<meta name="description" content="30 秒限時拳擊小遊戲，打爆滿口 AI 會取代你的語錄神棍。">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{background:#FFF5D6;display:flex;align-items:stretch;justify-content:stretch;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC',sans-serif;overflow:hidden}
#game{background:#FFF5D6;width:100vw;height:100vh;min-height:100vh;overflow:hidden;cursor:crosshair;position:relative;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
#hud{display:none;justify-content:space-between;align-items:center;padding:10px 18px;background:#3D1F08;color:#FAC775;font-size:13px;font-weight:700;flex-shrink:0}
#hud-right{display:flex;align-items:center;gap:12px}
#td{font-size:22px;font-weight:900;color:#FAC775;font-variant-numeric:tabular-nums;min-width:36px;text-align:center;transition:color .2s}
#td.urg{color:#E24B4A;animation:tpulse .45s infinite alternate}
@keyframes tpulse{from{opacity:1}to{opacity:.5}}
#tbw{height:5px;background:#7A3E10;display:none;flex-shrink:0}
#tb{height:5px;background:#FAC775;width:100%;transition:width .1s linear}
.lang-switch{position:absolute;top:14px;right:16px;z-index:40;padding:6px 10px;background:#FAC775;color:#3D1F08;border:2px solid #3D1F08;border-radius:999px;font-size:11px;font-weight:800;text-decoration:none;line-height:1}
.lang-switch:hover{background:#fff}
#stopbtn{display:none;padding:6px 10px;background:#FAC775;color:#3D1F08;border:2px solid #BA7517;border-radius:999px;font-size:11px;font-weight:900;cursor:pointer;line-height:1}
#stopbtn:hover{background:#fff}

/* Arena */
#arena{flex:1;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:14px 16px 0;position:relative;min-height:320px;overflow:visible}
#bub{background:#fff;border:3px solid #3D1F08;border-radius:16px;padding:12px 18px;width:min(100%,960px);text-align:center;position:relative;margin-bottom:22px;transition:opacity .2s,transform .2s;min-height:70px}
#bub.hide{opacity:0;transform:translateY(-8px);pointer-events:none}
#bub::after{content:'';position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);border:11px solid transparent;border-top:20px solid #3D1F08}
#bub::before{content:'';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);border:9px solid transparent;border-top:16px solid #fff;z-index:1}
#qt{font-size:13.5px;color:#2C2C2A;line-height:1.65;font-weight:600}
#qs{font-size:11px;color:#888780;margin-top:4px}
#npcstage{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:4px;position:relative;z-index:2}
#hpbar{display:flex;gap:8px;margin:0}
.hp{width:14px;height:14px;border-radius:50%;background:#E24B4A;border:2px solid #3D1F08;transition:all .2s}
.hp.e{background:#FFF5D6;border-color:#BA7517}
#nname{font-size:11px;color:#633806;font-weight:700;background:#FAC775;border:2px solid #BA7517;border-radius:4px;padding:2px 10px;text-align:center}

/* NPC wrapper — fixed height so gloves know where to aim */
#npcw{position:relative;width:140px;height:190px;display:flex;align-items:flex-end;justify-content:center}
#npc{display:flex;flex-direction:column;align-items:center;transform-origin:50% 100%}
#npc.shk{animation:shk .35s}
#npc.ko{animation:nko .6s ease-in forwards}
#npc.enr{animation:enr .4s cubic-bezier(.2,1.4,.6,1)}
#npc.enl{animation:enl .4s cubic-bezier(.2,1.4,.6,1)}
@keyframes shk{0%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-6deg)}50%{transform:translateX(8px) rotate(5deg)}75%{transform:translateX(-4px) rotate(-2deg)}100%{transform:translateX(0) rotate(0)}}
@keyframes nko{0%{transform:rotate(0) translateX(0)}25%{transform:rotate(-14deg) translateX(-10px)}65%{transform:rotate(-82deg) translateX(-55px) translateY(28px)}100%{transform:rotate(-94deg) translateX(-90px) translateY(50px);opacity:0}}
@keyframes enr{from{transform:translateX(160px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes enl{from{transform:translateX(-160px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Face */
#hd{width:58px;height:58px;border:3px solid #3D1F08;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;z-index:1}
#eys{display:flex;gap:14px}
.ey{width:7px;height:7px;background:#2C2C2A;border-radius:50%;transition:all .15s}
.ey.sq{height:3px;border-radius:1px;margin-top:2px}
.ey.x{background:transparent!important;position:relative;border-radius:0}
.ey.x::before,.ey.x::after{content:'';position:absolute;width:11px;height:2.5px;background:#2C2C2A;border-radius:1px;top:50%;left:50%}
.ey.x::before{transform:translate(-50%,-50%) rotate(45deg)}
.ey.x::after{transform:translate(-50%,-50%) rotate(-45deg)}
#mth{width:18px;height:7px;border:2px solid #3D1F08;border-top:none;border-radius:0 0 9px 9px;transition:all .15s}
#mth.sad{border-top:2px solid #3D1F08;border-bottom:none;border-radius:9px 9px 0 0}
#mth.open{width:20px;height:14px;background:#3D1F08;border:2px solid #3D1F08;border-top:none;border-radius:0 0 5px 5px}
#tor{width:48px;height:48px;border:3px solid #3D1F08;margin-top:-3px;border-radius:3px 3px 0 0;position:relative;display:flex;justify-content:center;overflow:visible}
#tie{width:10px;height:26px;clip-path:polygon(50% 0%,100% 30%,50% 100%,0% 30%);margin-top:6px}
#lgs{display:flex;gap:4px;margin-top:-2px}
.lg{width:19px;height:24px;border:3px solid #3D1F08;border-top:none;border-radius:0 0 4px 4px}
.sh{width:24px;height:10px;background:#2C2C2A;border:2px solid #3D1F08;border-radius:0 5px 5px 0;margin-top:-1px;margin-left:-2px}

/* KO Banner */
#kobanner{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:54px;font-weight:900;color:#EF9F27;-webkit-text-stroke:4px #3D1F08;font-family:Impact,sans-serif;z-index:12;pointer-events:none;letter-spacing:3px;white-space:nowrap}
#kobanner.go{animation:koban .85s ease-out forwards}
@keyframes koban{0%{transform:translate(-50%,-50%) scale(0) rotate(-12deg)}35%{transform:translate(-50%,-50%) scale(1.3) rotate(6deg)}60%{transform:translate(-50%,-50%) scale(1) rotate(-1deg)}82%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1) translateY(-15px);opacity:0}}

/* Punch word */
#pw{position:absolute;font-size:30px;font-weight:900;color:#E24B4A;-webkit-text-stroke:2px #3D1F08;display:none;pointer-events:none;z-index:10;font-family:Impact,'Arial Black',sans-serif;letter-spacing:-1px;max-width:150px;text-align:center;line-height:.95}
#pw.pop{display:block;animation:ppop .65s ease-out forwards}
@keyframes ppop{0%{opacity:1;transform:scale(.4) rotate(-14deg)}50%{opacity:1;transform:scale(1.3) rotate(6deg)}100%{opacity:0;transform:scale(1.05) rotate(-4deg) translateY(-28px)}}

/* Stars */
.str{position:absolute;width:11px;height:11px;background:#EF9F27;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);pointer-events:none;z-index:9}
.scp{position:absolute;font-size:16px;font-weight:700;color:#0F6E56;pointer-events:none;z-index:15;animation:scf .75s ease-out forwards;white-space:nowrap}
@keyframes scf{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
#fl{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;border-radius:10px;z-index:8;transition:opacity .13s}

/* New challenger banner */
.nc-banner{position:absolute;top:130px;right:18px;font-size:13px;font-weight:900;color:#D85A30;background:#FAC775;border:2px solid #3D1F08;border-radius:999px;padding:6px 12px;box-shadow:0 5px 0 rgba(61,31,8,.18);z-index:11;pointer-events:none;white-space:nowrap;animation:ncb .8s ease-out forwards}
@keyframes ncb{0%{opacity:0;transform:translateX(18px) scale(.8)}35%{opacity:1;transform:translateX(0) scale(1.04)}70%{opacity:1;transform:translateX(0) scale(1)}100%{opacity:0;transform:translateY(-12px) scale(.96)}}

/* Glove area — ABSOLUTE so we can position fists precisely */
#garea{display:none;position:relative;height:140px;flex-shrink:0;pointer-events:none}

/* Each glove wrapper — will be translated via JS toward NPC */
.gw{position:absolute;display:flex;flex-direction:column;align-items:center;bottom:0;transition:transform .22s cubic-bezier(.4,0,.2,1)}
#gw-left{left:30px}
#gw-right{right:30px}

/* Glove shape */
.gl{width:80px;height:66px;border:3px solid #3D1F08;border-radius:50% 50% 36% 36%;position:relative}
.gl::before{content:'';position:absolute;width:24px;height:28px;border:3px solid #3D1F08;border-radius:40% 60% 0 0;border-bottom:none}
.left.gl::before{right:9px;top:-24px;background:inherit}
.right.gl::before{left:9px;top:-24px;background:inherit}
.wst{width:50px;height:22px;background:#BA7517;border:3px solid #3D1F08;border-top:none;border-radius:0 0 6px 6px}

/* Start Screen */
#intro,#ss{position:absolute;inset:0;background:#FFF5D6;border-radius:10px;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:30;padding:24px}
#intro{display:flex}
#ss{display:none}
#ititle,#gtitle{font-size:46px;font-weight:900;color:#D85A30;-webkit-text-stroke:3px #3D1F08;font-family:Impact,sans-serif;letter-spacing:4px;text-align:center;line-height:.95}
#gtitle{font-size:48px;font-weight:900;color:#D85A30;-webkit-text-stroke:3px #3D1F08;font-family:Impact,sans-serif;letter-spacing:5px;text-align:center}
.intro-badge{font-size:12px;font-weight:900;letter-spacing:1px;color:#FAC775;background:#3D1F08;border-radius:999px;padding:6px 12px}
.i-sub,.s-sub{font-size:14px;color:#633806;text-align:center;line-height:1.75;max-width:360px;font-weight:500}
.intro-grid{display:grid;grid-template-columns:1fr;gap:10px;width:100%;max-width:360px}
.intro-card{background:#fff;border:3px solid #3D1F08;border-radius:14px;padding:12px 14px;text-align:left}
.intro-head{font-size:12px;font-weight:900;color:#D85A30;margin-bottom:5px;letter-spacing:.5px}
.intro-body{font-size:13px;color:#3D1F08;line-height:1.55}
.rules{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.rule{font-size:12px;color:#888780;background:#fff;border:2px solid #BA7517;border-radius:6px;padding:4px 10px}
#ibtn,#sbtn,#sbtn-infinite{padding:14px 32px;background:#D85A30;color:#fff;border:3px solid #3D1F08;border-radius:10px;font-size:18px;font-weight:800;cursor:pointer;letter-spacing:1px}
#ibtn:hover,
#sbtn:hover,
#sbtn-infinite:hover{background:#993C1D;transform:scale(1.03)}

/* End Screen */
#es{display:none;position:absolute;inset:0;background:#FFF5D6;border-radius:10px;flex-direction:column;align-items:center;justify-content:center;gap:13px;z-index:30;padding:22px}
#es.on{display:flex}
.et{font-size:38px;font-weight:900;color:#D85A30;-webkit-text-stroke:2px #3D1F08;font-family:Impact,sans-serif;letter-spacing:3px}
.estats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.sbox{background:#fff;border:3px solid #3D1F08;border-radius:10px;padding:10px 18px;text-align:center;min-width:90px}
.snum{font-size:30px;font-weight:900;color:#D85A30}
.slbl{font-size:11px;color:#888780;font-weight:600;margin-top:2px}
.rating{font-size:15px;color:#3D1F08;font-weight:700;background:#FAC775;border:2px solid #BA7517;border-radius:8px;padding:7px 20px;text-align:center}
.sh-title{font-size:13px;color:#3D1F08;font-weight:700;margin-top:2px}
.sh-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.shbtn{padding:9px 16px;border:3px solid #3D1F08;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;line-height:1;white-space:nowrap}
.shbtn:disabled{opacity:.55;cursor:wait}
.shbtn.tw{background:#000;color:#fff}
.shbtn.th{background:#fff;color:#3D1F08}
.shbtn.dl{background:#FAC775;color:#3D1F08}
.shbtn:hover{opacity:.85}
#rbtn{padding:10px 28px;background:#D85A30;color:#fff;border:3px solid #3D1F08;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer}
#rbtn:hover{background:#993C1D}
.mode-select{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.modebtn.alt{background:#FAC775;color:#3D1F08}
.modebtn.alt:hover{background:#FFE6A7}

@media (min-width: 900px){
  .lang-switch{top:20px;right:24px;font-size:13px;padding:8px 12px}
  #hud{padding:18px 32px;font-size:22px}
  #hud-right{gap:20px}
  #td{font-size:48px;min-width:64px}
  #stopbtn{font-size:13px;padding:8px 12px}
  #arena{padding:28px clamp(42px,6vw,96px) 0}
  #bub{width:min(100%,1180px);padding:22px 34px;min-height:122px;margin-bottom:34px}
  #bub::after{bottom:-24px;border-width:13px;border-top-width:24px}
  #bub::before{bottom:-17px;border-width:11px;border-top-width:19px}
  #qt{font-size:28px}
  #qs{font-size:17px;margin-top:8px}
  #npcstage{gap:12px;margin-top:12px}
  #hpbar{gap:14px}
  .hp{width:20px;height:20px}
  #nname{font-size:17px;padding:5px 18px}
  #npcw{width:300px;height:400px;transform:scale(1.9);transform-origin:50% 100%}
  #garea{height:290px}
  #gw-left{left:clamp(44px,8vw,140px)}
  #gw-right{right:clamp(44px,8vw,140px)}
  .gl{width:132px;height:108px}
  .gl::before{width:40px;height:46px}
  .left.gl::before,.right.gl::before{top:-36px}
  .wst{width:84px;height:34px}
  #pw{font-size:54px;max-width:260px}
  .nc-banner{top:194px;right:clamp(22px,5vw,64px);font-size:20px;padding:10px 18px}
  #intro,#ss,#es{padding:32px}
  #ititle,#gtitle{font-size:74px}
  .i-sub,.s-sub{max-width:680px;font-size:22px}
  .intro-grid{max-width:880px;grid-template-columns:repeat(3,1fr);gap:16px}
  .intro-head{font-size:16px}
  .intro-body{font-size:18px}
  .rule{font-size:16px;padding:8px 16px}
  #ibtn,#sbtn,#sbtn-infinite,#rbtn{font-size:22px;padding:16px 28px}
  .estats{gap:18px}
  .sbox{min-width:140px;padding:16px 24px}
  .snum{font-size:42px}
  .slbl{font-size:15px}
  .rating{font-size:22px;padding:10px 28px}
  .sh-title{font-size:18px}
  .shbtn{font-size:16px;padding:12px 18px}
}

@media (min-width: 1400px){
  #arena{padding:34px clamp(64px,8vw,140px) 0}
  #bub{width:min(100%,1320px);padding:24px 42px;min-height:138px}
  #qt{font-size:32px}
  #qs{font-size:18px}
  #npcw{width:340px;height:450px;margin-top:34px;transform:scale(2.15)}
  #garea{height:340px}
  #gw-left{left:clamp(60px,10vw,180px)}
  #gw-right{right:clamp(60px,10vw,180px)}
  #pw{font-size:62px;max-width:300px}
}

@media (max-width: 768px){
  body{overflow:auto}
  #game{height:auto;min-height:100vh}
}
</style>
</head>
<body>
<div id="game">
  <a id="lang-switch" class="lang-switch" href="#"></a>
  <!-- HUD -->
  <div id="hud">
    <div><span id="hud-ko-label">KO</span> <span id="kos" style="font-size:19px;color:#EF9F27">0</span></div>
    <div id="td">30</div>
    <div id="hud-right">
      <div><span id="hud-score-label">分數</span> <span id="sc">0</span></div>
      <button id="stopbtn" onclick="stopInfiniteGame(event)"></button>
    </div>
  </div>
  <div id="tbw"><div id="tb"></div></div>

  <!-- Arena -->
  <div id="arena" onclick="punch(event)">
    <div id="bub"><div id="qt"></div><div id="qs"></div></div>
    <div id="npcstage">
      <div id="hpbar"><div class="hp" id="h1"></div><div class="hp" id="h2"></div><div class="hp" id="h3"></div></div>
      <div id="nname"></div>
      <div id="npcw">
        <div id="npc">
          <div id="hd">
            <div id="eys"><div class="ey" id="el"></div><div class="ey" id="er"></div></div>
            <div id="mth"></div>
          </div>
          <div id="tor"><div id="tie"></div></div>
          <div id="lgs">
            <div><div class="lg" id="ll"></div><div class="sh"></div></div>
            <div><div class="lg" id="lr"></div><div class="sh"></div></div>
          </div>
        </div>
      </div>
    </div>
    <div id="kobanner">K.O.!</div>
    <div id="pw"></div>
    <div id="fl"></div>
  </div>

  <!-- Gloves -->
  <div id="garea" onclick="punch(event)">
    <div class="gw" id="gw-left">
      <div class="gl left" id="gl-left" style="background:#D85A30"></div>
      <div class="wst"></div>
    </div>
    <div class="gw" id="gw-right">
      <div class="gl right" id="gl-right" style="background:#D85A30"></div>
      <div class="wst"></div>
    </div>
  </div>

  <!-- Introduction -->
  <div id="intro">
    <div class="intro-badge" id="ibadge">ROUND 0</div>
    <div id="ititle">先聽他們講完，再進場開扁</div>
    <div class="i-sub" id="isub"></div>
    <div class="intro-grid">
      <div class="intro-card">
        <div class="intro-head" id="ic1h"></div>
        <div class="intro-body" id="ic1b"></div>
      </div>
      <div class="intro-card">
        <div class="intro-head" id="ic2h"></div>
        <div class="intro-body" id="ic2b"></div>
      </div>
      <div class="intro-card">
        <div class="intro-head" id="ic3h"></div>
        <div class="intro-body" id="ic3b"></div>
      </div>
    </div>
    <button id="ibtn" onclick="showStartScreen()"></button>
  </div>

  <!-- Start Screen -->
  <div id="ss">
    <div id="gtitle">扁 AI 語錄</div>
    <div class="s-sub" id="ssub">有人說 AI 會取代你？<br>30 秒限時，打爆所有 AI 神棍！</div>
    <div class="rules">
      <div class="rule" id="rule1">每人需 3 拳 KO</div>
      <div class="rule" id="rule2">快速連擊加倍得分</div>
      <div class="rule" id="rule3">KO 獎勵 +50 分</div>
    </div>
    <div class="mode-select">
      <button id="sbtn" onclick="startGame('timed')">開始 30 秒挑戰！</button>
      <button id="sbtn-infinite" class="modebtn alt" onclick="startGame('infinite')"></button>
    </div>
  </div>

  <!-- End Screen -->
  <div id="es">
    <div class="et" id="etimeup">時間到！</div>
    <div class="estats">
      <div class="sbox"><div class="snum" id="eko">0</div><div class="slbl" id="eko-label">KO 人數</div></div>
      <div class="sbox"><div class="snum" id="esc">0</div><div class="slbl" id="esc-label">總得分</div></div>
      <div class="sbox"><div class="snum" id="ecb">0</div><div class="slbl" id="ecb-label">最高連擊</div></div>
    </div>
    <div class="rating" id="rating">評級中...</div>
    <div class="sh-title" id="share-title">分享你的戰績圖！</div>
    <div class="sh-btns">
      <button class="shbtn dl" id="dlbtn" onclick="downloadShareCard()">下載 JPG</button>
      <button class="shbtn tw" id="twbtn" onclick="shareX()">𝕏 / Twitter</button>
      <button class="shbtn th" id="thbtn" onclick="shareThreads()">Threads</button>
    </div>
    <button id="rbtn" onclick="resetGame(event)">再挑戰一次！</button>
  </div>
</div>

<script>
const LANG = new URLSearchParams(window.location.search).get('lang') === 'en' ? 'en' : 'zh';
const UI = {
  zh: {
    htmlLang: 'zh-TW',
    title: '扁 AI 語錄 — 30秒限時拳擊挑戰',
    description: '30 秒限時拳擊小遊戲，打爆滿口 AI 會取代你的語錄神棍。',
    introBadge: 'ROUND 0',
    introTitle: '先聽他們講完，再進場開扁',
    introSub: '這不是辯論，是一場 30 秒的職涯保衛戰。把那些把 AI 神化、順便叫你轉行的語錄通通揍飛。',
    introCard1Title: '你的任務',

/* ─── Audio Engine ─── */
let actx = null;
function getAC() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function playHit(strength = 1) {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    // Low thud
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(140 * strength, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    gain.gain.setValueAtTime(0.7, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.2);
    // Impact crack (noise burst)
    const buf = ac.createBuffer(1, ac.sampleRate * 0.07, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const ns = ac.createBufferSource();
    const nf = ac.createBiquadFilter();
    const ng = ac.createGain();
    nf.type = 'bandpass'; nf.frequency.value = 1800; nf.Q.value = 0.8;
    ng.gain.setValueAtTime(0.5 * strength, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
    ns.buffer = buf;
    ns.connect(nf); nf.connect(ng); ng.connect(ac.destination);
    ns.start(t); ns.stop(t + 0.07);
  } catch(e) {}
}
function playKO() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    // Big thud
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(28, t + 0.35);
    gain.gain.setValueAtTime(1.0, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.4);
    // Stars jingle — quick ascending tones
    [0, 0.10, 0.20].forEach((dt, i) => {
      const o2 = ac.createOscillator();
      const g2 = ac.createGain();
      o2.type = 'triangle';
      o2.frequency.value = 520 + i * 180;
      g2.gain.setValueAtTime(0.25, t + dt);
      g2.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.12);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(t + dt); o2.stop(t + dt + 0.15);
    });
    // Crowd "wooo" — noise filtered to cheering freq
    const buf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
    const dd = buf.getChannelData(0);
    for (let i = 0; i < dd.length; i++) dd[i] = (Math.random() * 2 - 1) * (1 - i / dd.length) * 0.3;
    const ns = ac.createBufferSource();
    const nf = ac.createBiquadFilter();
    const ng = ac.createGain();
    nf.type = 'bandpass'; nf.frequency.value = 600; nf.Q.value = 1.2;
    ng.gain.setValueAtTime(0.6, t + 0.05);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    ns.buffer = buf;
    ns.connect(nf); nf.connect(ng); ng.connect(ac.destination);
    ns.start(t + 0.05); ns.stop(t + 0.5);
  } catch(e) {}
}
function playTimeUp() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    [0, 0.15, 0.3, 0.48].forEach((dt, i) => {
      const freqs = [440, 370, 330, 220];
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'square'; o.frequency.value = freqs[i];
      g.gain.setValueAtTime(0.2, t + dt);
      g.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.13);
      o.connect(g); g.connect(ac.destination);
      o.start(t + dt); o.stop(t + dt + 0.15);
    });
  } catch(e) {}
}
function playTickBeep() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'square'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.07);
  } catch(e) {}
}
function playNewChallenger() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    [0,0.09,0.18].forEach((dt,i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'triangle'; o.frequency.value = 330 + i * 110;
      g.gain.setValueAtTime(0.2, t+dt); g.gain.exponentialRampToValueAtTime(0.001, t+dt+0.1);
      o.connect(g); g.connect(ac.destination); o.start(t+dt); o.stop(t+dt+0.12);
    });
  } catch(e){}
}

/* ─── Glove Targeting ─── */
function getGloveTarget() {
  // Returns {dx, dy} translation to move glove toward NPC head from rest position
  const npcEl = document.getElementById('hd');
  const gareaEl = document.getElementById('garea');
  const leftGw = document.getElementById('gw-left');
  const rightGw = document.getElementById('gw-right');

  const npcR = npcEl.getBoundingClientRect();
  const gareaR = gareaEl.getBoundingClientRect();
  const leftR = leftGw.getBoundingClientRect();
  const rightR = rightGw.getBoundingClientRect();

  // NPC head center relative to garea
  const headCX = npcR.left + npcR.width / 2 - gareaR.left;
  const headCY = npcR.top + npcR.height / 2 - gareaR.top;

  // Left glove center (top of gl) relative to garea
  const leftCX = leftR.left + leftR.width / 2 - gareaR.left;
  const leftTopY = leftR.top - gareaR.top;

  const rightCX = rightR.left + rightR.width / 2 - gareaR.left;
  const rightTopY = rightR.top - gareaR.top;

  return {
    left:  { dx: headCX - leftCX  + (Math.random()*16-8), dy: headCY - leftTopY  - 20 },
    right: { dx: headCX - rightCX + (Math.random()*16-8), dy: headCY - rightTopY - 20 },
  };
}

function fireGlove(side) {
  const gw = document.getElementById('gw-' + side);
  const target = getGloveTarget();
  const {dx, dy} = target[side];
  // Animate: shoot toward head then snap back
  gw.style.transition = 'transform 0.13s cubic-bezier(0.2,0.8,0.3,1)';
  gw.style.transform = `translate(${dx}px, ${dy}px) rotate(${side==='left'?-14:14}deg) scale(1.08)`;
  setTimeout(() => {
    gw.style.transition = 'transform 0.22s cubic-bezier(0.4,0,0.6,1)';
    gw.style.transform = 'translate(0,0) rotate(0deg) scale(1)';
  }, 160);
}

/* ─── Main Punch ─── */
function punch(e) {
  if (GST !== 'playing' || busy) return;
  const now = Date.now();
  if (now - lt < 200) return;
  cb = (lt > 0 && now - lt < 1300) ? Math.min(cb + 1, 10) : 1;
  maxCb = Math.max(maxCb, cb);
  lt = now; busy = true; setTimeout(() => busy = false, 200);

  // Glove fires toward head
  const punchSide = pt === 0 ? 'left' : 'right';
  fireGlove(punchSide); pt = 1 - pt;

  // NPC shake
  const npc = document.getElementById('npc');
  npc.classList.remove('shk'); void npc.offsetWidth; npc.classList.add('shk');
  setTimeout(() => npc.classList.remove('shk'), 350);
  setFace('hit');

  // Screen flash
  const fl = document.getElementById('fl');
  fl.style.opacity = '.28'; setTimeout(() => fl.style.opacity = '0', 110);

  // Sound — harder hits sound stronger
  const hitStrength = cb > 3 ? 1.4 : 1.0;
  playHit(hitStrength);

  // POW word near NPC head
  const pw = document.getElementById('pw');
  pw.textContent = getPunchWords()[Math.floor(Math.random() * getPunchWords().length)];
  const npcR = document.getElementById('hd').getBoundingClientRect();
  const arR = document.getElementById('arena').getBoundingClientRect();
  const pwLeft = punchSide === 'left'
    ? npcR.right - arR.left + 14
    : npcR.left - arR.left - 122;
  pw.style.left = Math.max(10, Math.min(arR.width - 140, pwLeft)) + 'px';
  pw.style.top = Math.max(12, npcR.top - arR.top + 8 + Math.random() * 10) + 'px';
  pw.classList.remove('pop'); void pw.offsetWidth; pw.classList.add('pop');

  spawnStars();

  const pts = 10 * cb; sc += pts; updHUD();
  showPop('+' + pts + (cb > 1 ? ' ×' + cb : ''));

  nHP--;
  updHP();
  if (nHP <= 0) {
    setFace('ko');
    setTimeout(doKO, 80);
  } else {
    setTimeout(() => setFace(nHP === 2 ? 'hurt' : 'bad'), 280);
  }
}

function doKO() {
  if (GST === 'ending' || GST === 'ended') return;
  GST = 'ko';
  koC++; sc += 50; updHUD();
  document.getElementById('bub').classList.add('hide');
  const npc = document.getElementById('npc');
  npc.classList.remove('shk'); void npc.offsetWidth; npc.classList.add('ko');
  const kb = document.getElementById('kobanner');
  kb.classList.remove('go'); void kb.offsetWidth; kb.classList.add('go');
  playKO();
  for (let i = 0; i < 4; i++) setTimeout(spawnStars, i * 110);
  setTimeout(() => showPop(ui('koBonus')), 150);

  setTimeout(() => {
    npc.className = ''; npc.style.opacity = '0'; npc.style.transform = '';
    if (tLeft <= 0) { GST = 'ending'; return; }
    setTimeout(() => {
      const banner = document.createElement('div');
      banner.className = 'nc-banner'; banner.textContent = ui('newChallenger');
      document.getElementById('arena').appendChild(banner);
      setTimeout(() => banner.remove(), 820);
      playNewChallenger();
      const side = Math.random() > .5 ? 'enr' : 'enl';
      spawnNPC(side); GST = 'playing';
    }, 200);
  }, 760);
}

function showPop(txt) {
  const ar = document.getElementById('arena');
  const s = document.createElement('div');
  s.className = 'scp'; s.textContent = txt;
  s.style.left = (55 + Math.random() * 200) + 'px'; s.style.top = '24px';
  ar.appendChild(s); setTimeout(() => s.remove(), 750);
}

function spawnStars() {
  const ar = document.getElementById('arena'), nr = document.getElementById('npc');
  if (!nr) return;
  const arR = ar.getBoundingClientRect(), nrR = nr.getBoundingClientRect();
  const cx = nrR.left - arR.left + nrR.width / 2, cy = nrR.top - arR.top + nrR.height / 2;
  for (let i = 0; i < 9; i++) {
    const s = document.createElement('div'); s.className = 'str';
    s.style.cssText = `left:${cx}px;top:${cy}px;position:absolute;transition:all .6s ease-out`;
    ar.appendChild(s);
    const a = (i / 9) * Math.PI * 2, d = 38 + Math.random() * 30;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      s.style.left = (cx + Math.cos(a) * d) + 'px'; s.style.top = (cy + Math.sin(a) * d) + 'px';
      s.style.opacity = '0'; s.style.transform = 'scale(0)';
    }));
    setTimeout(() => s.remove(), 650);
  }
}

/* ─── Timer ─── */
function tick() {
  if (gameMode !== 'timed') return;
  tLeft = Math.max(0, tLeft - 0.1);
  const t = Math.ceil(tLeft);
  const td = document.getElementById('td');
  td.textContent = t; td.className = t <= 10 ? 'urg' : '';
  document.getElementById('tb').style.width = (tLeft / 30 * 100) + '%';
  if (t < prevSec && t <= 10 && t > 0) { playTickBeep(); prevSec = t; }
  if (tLeft <= 0) { clearInterval(tIv); playTimeUp(); GST = 'ending'; setTimeout(endGame, 500); }
}

/* ─── Start / End / Reset ─── */
function stopInfiniteGame(e) {
  e.stopPropagation();
  if (gameMode !== 'infinite' || GST === 'ended' || GST === 'ending') return;
  GST = 'ending';
  endGame();
}

function startGame(mode = 'timed') {
  getAC(); // unlock audio context on user gesture
  document.getElementById('intro').style.display = 'none';
  document.getElementById('ss').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('arena').style.display = 'flex';
  document.getElementById('garea').style.display = 'block';
  document.getElementById('es').classList.remove('on');
  clearInterval(tIv);
  shareCardBlob = null;
  shareCardFilename = '';
  shareCardPromise = null;
  gameMode = mode;
  cOrder = shuffle([...Array(NPCS.length).keys()]);
  cPos = 0; tLeft = mode === 'timed' ? 30 : Infinity; sc = 0; koC = 0; cb = 1; maxCb = 1; nHP = 3; lt = 0; pt = 0; busy = false; prevSec = 30;
  document.getElementById('tbw').style.display = mode === 'timed' ? 'block' : 'none';
  document.getElementById('stopbtn').style.display = mode === 'infinite' ? 'inline-flex' : 'none';
  document.getElementById('td').textContent = mode === 'timed' ? '30' : ui('endlessTimer');
  document.getElementById('td').className = '';
  document.getElementById('tb').style.width = '100%';
  updHUD(); spawnNPC('enr'); GST = 'playing';
  if (mode === 'timed') tIv = setInterval(tick, 100);
}

function endGame() {
  clearInterval(tIv); GST = 'ended';
  document.getElementById('stopbtn').style.display = 'none';
  document.getElementById('eko').textContent = koC;
  document.getElementById('esc').textContent = sc;
  document.getElementById('ecb').textContent = maxCb;
  let r = RATINGS[0];
  for (const rating of RATINGS) if (koC >= rating.min) r = rating;
  document.getElementById('rating').textContent = r.title[LANG] + ' — ' + r.sub[LANG];
  prepareShareCard();
  setTimeout(() => document.getElementById('es').classList.add('on'), 400);
}

function getShareUrl() {
  return window.location.href;
}

function getRatingSummary() {
  const text = document.getElementById('rating').textContent;
  const parts = text.split('—').map(part => part.trim()).filter(Boolean);
  return {
    title: parts[0] || text.trim(),
    sub: parts[1] || '',
  };
}

function getTxt() {
  const rating = getRatingSummary();
  if (LANG === 'en') {
    return `In the 30-second challenge, I knocked out ${koC} AI hot-take hustlers!\nScored ${sc} points, best combo x${maxCb}!\nRating: ${rating.title}\n\nCan you beat it?\n${getShareUrl()}\n\n${ui('hashtags')}`;
  }
  return `我在30秒限時挑戰中，KO了${koC}個AI語錄神棍！\n得了${sc}分，最高連擊×${maxCb}！\n評級：${rating.title}\n\n你也來試試！\n${getShareUrl()}\n\n${ui('hashtags')}`;
}

function roundRect(ctx, x, y, w, h, r) {
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + w, y, x + w, y + h, radius);
  ctx.arcTo(x + w, y + h, x, y + h, radius);
  ctx.arcTo(x, y + h, x, y, radius);
  ctx.arcTo(x, y, x + w, y, radius);
  ctx.closePath();
}

function drawCenteredLines(ctx, lines, x, startY, lineHeight) {
  lines.forEach((line, index) => {
    ctx.fillText(line, x, startY + index * lineHeight);
  });
}

function wrapTextLines(ctx, text, maxWidth) {
  const chars = [...text];
  const lines = [];
  let current = '';
  for (const ch of chars) {
    const next = current + ch;
    if (current && ctx.measureText(next).width > maxWidth) {
      lines.push(current);
      current = ch;
    } else {
      current = next;
    }
  }
  if (current) lines.push(current);
  return lines;
}

function drawShareCharacter(ctx, x, y, scale = 1) {
  const stroke = '#3D1F08';
  const skin = '#F5C4A0';
  const suit = '#5A3A1A';
  const tie = '#1D9E75';
  const line = 6 * scale;

  ctx.save();
  ctx.translate(x, y);
  ctx.lineWidth = line;
  ctx.strokeStyle = stroke;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  ctx.fillStyle = '#E24B4A';
  [0, 32, 64].forEach(offset => {
    ctx.beginPath();
    ctx.arc(offset, -80 * scale, 12 * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  });

  ctx.fillStyle = skin;
  ctx.fillRect(-54 * scale, -12 * scale, 30 * scale, 42 * scale);
  ctx.fillRect(58 * scale, -12 * scale, 30 * scale, 42 * scale);
  ctx.strokeRect(-54 * scale, -12 * scale, 30 * scale, 42 * scale);
  ctx.strokeRect(58 * scale, -12 * scale, 30 * scale, 42 * scale);

  ctx.beginPath();
  ctx.arc(32 * scale, 0, 56 * scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = stroke;
  ctx.beginPath();
  ctx.arc(4 * scale, -2 * scale, 7 * scale, 0, Math.PI * 2);
  ctx.arc(60 * scale, -2 * scale, 7 * scale, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.lineWidth = 5 * scale;
  ctx.arc(32 * scale, 14 * scale, 18 * scale, 0, Math.PI);
  ctx.stroke();

  ctx.fillStyle = suit;
  roundRect(ctx, -18 * scale, 60 * scale, 100 * scale, 122 * scale, 6 * scale);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = tie;
  ctx.beginPath();
  ctx.moveTo(32 * scale, 84 * scale);
  ctx.lineTo(44 * scale, 108 * scale);
  ctx.lineTo(32 * scale, 154 * scale);
  ctx.lineTo(20 * scale, 108 * scale);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = suit;
  ctx.fillRect(-18 * scale, 182 * scale, 36 * scale, 68 * scale);
  ctx.fillRect(46 * scale, 182 * scale, 36 * scale, 68 * scale);
  ctx.strokeRect(-18 * scale, 182 * scale, 36 * scale, 68 * scale);
  ctx.strokeRect(46 * scale, 182 * scale, 36 * scale, 68 * scale);

  ctx.fillStyle = '#2C2C2A';
  roundRect(ctx, -26 * scale, 252 * scale, 52 * scale, 20 * scale, 10 * scale);
  ctx.fill();
  ctx.stroke();
  roundRect(ctx, 38 * scale, 252 * scale, 52 * scale, 20 * scale, 10 * scale);
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function setShareButtonsBusy(isBusy) {
  ['dlbtn','twbtn','thbtn'].forEach(id => {
    document.getElementById(id).disabled = isBusy;
  });
}

function buildShareImageBlob() {
  const canvas = document.createElement('canvas');
  canvas.width = 1200;
  canvas.height = 1500;
  const ctx = canvas.getContext('2d');
  const rating = getRatingSummary();
  const stats = [
    {value: koC, label: ui('statKo')},
    {value: sc, label: ui('statScore')},
    {value: maxCb, label: ui('statCombo')},
  ];

  ctx.fillStyle = '#FFF5D6';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  bg.addColorStop(0, '#FFF8E4');
  bg.addColorStop(1, '#FFE7B8');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = 'rgba(216,90,48,0.14)';
  ctx.beginPath();
  ctx.arc(1080, 190, 150, 0, Math.PI * 2);
  ctx.arc(140, 1310, 210, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#FFFDF7';
  roundRect(ctx, 72, 72, 1056, 1356, 44);
  ctx.fill();
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#3D1F08';
  ctx.stroke();

  ctx.fillStyle = '#3D1F08';
  ctx.font = '900 44px "Arial Black", "Noto Sans TC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(ui('shareCardHeader'), canvas.width / 2, 152);

  ctx.fillStyle = '#D85A30';
  ctx.font = '900 96px Impact, "Arial Black", sans-serif';
  ctx.fillText(ui('timeUp'), canvas.width / 2, 270);

  drawShareCharacter(ctx, 458, 472, 2.5);

  ctx.fillStyle = '#FAC775';
  roundRect(ctx, 710, 360, 300, 64, 26);
  ctx.fill();
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#BA7517';
  ctx.stroke();

  ctx.fillStyle = '#633806';
  ctx.font = '700 28px "Noto Sans TC", Arial, sans-serif';
  ctx.fillText(ui('shareCardFooter'), 860, 403);

  const titleFont = LANG === 'en' ? '900 72px Impact, "Arial Black", sans-serif' : '900 64px "Noto Sans TC", "Arial Black", sans-serif';
  ctx.fillStyle = '#D85A30';
  ctx.font = titleFont;
  ctx.fillText(rating.title, 858, 510);

  if (rating.sub) {
    ctx.fillStyle = '#3D1F08';
    ctx.font = LANG === 'en' ? '700 34px Arial, sans-serif' : '700 34px "Noto Sans TC", Arial, sans-serif';
    ctx.fillText(rating.sub, 858, 560);
  }

  stats.forEach((stat, index) => {
    const boxX = 120 + index * 320;
    ctx.fillStyle = '#FFFFFF';
    roundRect(ctx, boxX, 820, 280, 220, 28);
    ctx.fill();
    ctx.lineWidth = 6;
    ctx.strokeStyle = '#3D1F08';
    ctx.stroke();

    ctx.fillStyle = '#D85A30';
    ctx.font = '900 82px Impact, "Arial Black", sans-serif';
    ctx.fillText(String(stat.value), boxX + 140, 915);

    ctx.fillStyle = '#7B766B';
    ctx.font = LANG === 'en' ? '700 30px Arial, sans-serif' : '700 30px "Noto Sans TC", Arial, sans-serif';
    const labelLines = wrapTextLines(ctx, stat.label, 220);
    drawCenteredLines(ctx, labelLines, boxX + 140, 970, 36);
  });

  ctx.fillStyle = '#FAC775';
  roundRect(ctx, 120, 1098, 960, 120, 30);
  ctx.fill();
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#BA7517';
  ctx.stroke();

  ctx.fillStyle = '#3D1F08';
  ctx.font = LANG === 'en' ? '700 40px Arial, sans-serif' : '700 40px "Noto Sans TC", Arial, sans-serif';
  ctx.fillText(ui('shareCardCta'), canvas.width / 2, 1174);
  ctx.font = LANG === 'en' ? '700 28px Arial, sans-serif' : '700 28px "Noto Sans TC", Arial, sans-serif';
  ctx.fillText(getShareUrl(), canvas.width / 2, 1258);

  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if (!blob) {
        reject(new Error('Failed to generate share image.'));
        return;
      }
      resolve(blob);
    }, 'image/jpeg', 0.92);
  });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function getShareFilename() {
  return `${LANG === 'en' ? 'punch-ai-quotes' : '扁AI語錄'}-${koC}ko-${sc}pts.jpg`;
}

async function prepareShareCard() {
  shareCardBlob = null;
  shareCardFilename = getShareFilename();
  shareCardPromise = buildShareImageBlob()
    .then(blob => {
      shareCardBlob = blob;
      return blob;
    })
    .catch(err => {
      shareCardBlob = null;
      throw err;
    });

  const dlbtn = document.getElementById('dlbtn');
  setShareButtonsBusy(true);
  dlbtn.textContent = ui('sharePreparing');
  try {
    await shareCardPromise;
  } catch (err) {
    console.error(err);
  } finally {
    dlbtn.textContent = ui('downloadJpg');
    setShareButtonsBusy(false);
  }
}

async function ensureShareCardReady() {
  if (shareCardBlob) return shareCardBlob;
  if (!shareCardPromise) {
    shareCardFilename = getShareFilename();
    shareCardPromise = buildShareImageBlob().then(blob => {
      shareCardBlob = blob;
      return blob;
    });
  }
  return shareCardPromise;
}

async function downloadShareCard() {
  const btn = document.getElementById('dlbtn');
  btn.disabled = true;
  btn.textContent = ui('sharePreparing');
  try {
    const blob = await ensureShareCardReady();
    downloadBlob(blob, shareCardFilename || getShareFilename());
    btn.textContent = ui('shareReady');
    setTimeout(() => {
      btn.textContent = ui('downloadJpg');
      btn.disabled = false;
    }, 1200);
    return;
  } catch (err) {
    console.error(err);
  }
  btn.textContent = ui('downloadJpg');
  btn.disabled = false;
}

function getComposerUrl(platform) {
  const text = getTxt();
  if (platform === 'threads') {
    return 'https://www.threads.net/intent/post?text=' + encodeURIComponent(text);
  }
  return 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
}

async function shareSocial(platform) {
  const btn = document.getElementById(platform === 'threads' ? 'thbtn' : 'twbtn');
  const originalLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = ui('sharePreparing');

  try {
    const blob = await ensureShareCardReady();
    const filename = shareCardFilename || getShareFilename();
    const file = typeof File === 'function' ? new File([blob], filename, {type:'image/jpeg'}) : null;

    if (file && navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
      await navigator.share({
        files: [file],
        text: getTxt(),
        title: ui('startTitle'),
      });
      return;
    }

    downloadBlob(blob, filename);
    window.open(getComposerUrl(platform), '_blank');
  } catch (err) {
    if (err && err.name === 'AbortError') return;
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = originalLabel;
  }
}

function shareX() {
  shareSocial('x');
}

function shareThreads() {
  shareSocial('threads');
}

function resetGame(e) {
  e.stopPropagation();
  startGame(gameMode);
}
applyLanguage();
</script>
