<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扁 AI 語錄 — 30秒限時拳擊挑戰</title>
<meta name="description" content="30 秒限時拳擊小遊戲，打爆滿口 AI 會取代你的語錄神棍。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bai+Jamjuree:wght@400;700;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0E0B1A;
  --ink-2: #1A1530;
  --ink-3: #261D44;
  --paper: #F5F1E6;
  --red: #FF2D5C;
  --red-deep: #C81D44;
  --yellow: #FFD23F;
  --cyan: #00E5FF;
  --green: #39FF6A;
  --magenta: #FF4FD8;
  --grid: rgba(255,210,63,.08);
  --pixel: 4px;
  --shadow: 0 8px 0 rgba(0,0,0,.9);
  --shadow-sm: 0 4px 0 rgba(0,0,0,.9);
  --font-pixel: "Press Start 2P","Silkscreen",monospace;
  --font-mono: "Bai Jamjuree","JetBrains Mono",monospace;
  --font-display: "Bai Jamjuree","Noto Sans TC",system-ui,sans-serif;
  --font-zh: "Noto Sans TC","PingFang TC",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:var(--font-display);color:var(--paper);background:var(--ink);-webkit-font-smoothing:antialiased}

/* Arcade backdrop */
.arcade-bg {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,45,92,.14), transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(0,229,255,.10), transparent 55%),
    linear-gradient(180deg, var(--ink) 0%, #060410 100%);
  position:relative;overflow:hidden;
}
.arcade-bg::before {
  content:"";position:absolute;inset:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;
  mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%);
}
.arcade-bg::after {
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.08) 0 2px,transparent 2px 4px);
  pointer-events:none;mix-blend-mode:multiply;
}

/* Pixel borders */
.pix-box{border:var(--pixel) solid var(--paper);box-shadow:inset 0 0 0 2px var(--ink),var(--shadow);background:var(--ink-2);border-radius:2px}
.pix-box-inset{border:3px solid var(--ink);background:var(--ink-3);box-shadow:inset 0 4px 0 rgba(0,0,0,.5);border-radius:2px}
.pix-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:2px solid var(--ink);background:var(--yellow);color:var(--ink);font-family:var(--font-pixel);font-size:9px;letter-spacing:.5px;border-radius:2px;box-shadow:var(--shadow-sm)}

/* Type */
.t-pixel{font-family:var(--font-pixel);letter-spacing:1px;line-height:1.4}
.t-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.t-display{font-family:var(--font-display);font-weight:800}
.t-zh{font-family:var(--font-zh)}
.headline{font-family:var(--font-pixel);color:var(--yellow);text-shadow:3px 0 0 var(--red),-3px 0 0 var(--cyan),0 0 18px rgba(255,210,63,.5);line-height:1.15;letter-spacing:2px}

/* Buttons */
.btn-pixel{font-family:var(--font-pixel);font-size:11px;letter-spacing:1px;padding:14px 20px;background:var(--red);color:var(--paper);border:3px solid var(--paper);box-shadow:inset 0 -4px 0 rgba(0,0,0,.35),inset 0 4px 0 rgba(255,255,255,.18),var(--shadow);cursor:pointer;text-transform:uppercase;border-radius:2px;transition:transform .08s,box-shadow .08s;position:relative}
.btn-pixel:hover{transform:translateY(2px);box-shadow:inset 0 -4px 0 rgba(0,0,0,.35),inset 0 4px 0 rgba(255,255,255,.18),0 6px 0 rgba(0,0,0,.9)}
.btn-pixel:active{transform:translateY(6px);box-shadow:inset 0 -2px 0 rgba(0,0,0,.4),0 2px 0 rgba(0,0,0,.9)}
.btn-pixel.alt{background:var(--cyan);color:var(--ink)}
.btn-pixel.ghost{background:var(--ink-2);color:var(--paper)}
.btn-pixel.warn{background:var(--yellow);color:var(--ink)}

/* HP bar (segmented) */
.hp{display:flex;align-items:stretch;gap:0;padding:4px;background:var(--ink);border:3px solid var(--paper);border-radius:2px;width:100%;height:22px;box-shadow:inset 0 0 0 1px var(--ink),0 4px 0 rgba(0,0,0,.6)}
.hp-seg{flex:1;background:linear-gradient(180deg,#FF6080,var(--red) 50%,var(--red-deep));border-right:2px solid var(--ink);box-shadow:inset 0 2px 0 rgba(255,255,255,.25)}
.hp-seg:last-child{border-right:none}
.hp-seg.empty{background:linear-gradient(180deg,var(--ink-3) 0%,var(--ink-2) 100%);box-shadow:inset 0 0 0 1px rgba(0,0,0,.6)}
.hp-seg.warn{background:linear-gradient(180deg,#FFE76A,var(--yellow) 50%,#B8861C)}
.hp-seg.crit{background:linear-gradient(180deg,#FF8090,var(--red) 50%,var(--red-deep));animation:hp-flash .35s steps(2) infinite}
@keyframes hp-flash{50%{filter:brightness(1.3)}}

/* Timer bar */
.timer-bar{height:10px;background:var(--ink);border:2px solid var(--paper);border-radius:2px;overflow:hidden;position:relative}
.timer-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--yellow) 60%,var(--red));box-shadow:inset 0 2px 0 rgba(255,255,255,.3);transition:width .1s linear}

/* Gloves */
.glove{background:var(--red);border:4px solid var(--ink);border-radius:50% 50% 35% 35%;position:relative;box-shadow:inset -8px -8px 0 rgba(0,0,0,.18),inset 8px 8px 0 rgba(255,255,255,.15),var(--shadow)}
.glove::before{content:"";position:absolute;width:30%;height:36%;border:4px solid var(--ink);border-bottom:none;border-radius:40% 60% 0 0;top:-28%;background:inherit}
.glove.left::before{right:10%}
.glove.right::before{left:10%}
.glove .cuff{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);width:82%;height:22px;background:var(--paper);border:4px solid var(--ink);border-top:none;border-radius:0 0 4px 4px}
.glove .laces{position:absolute;left:50%;top:28%;transform:translateX(-50%);width:4px;height:30%;background:repeating-linear-gradient(0deg,var(--ink) 0 4px,transparent 4px 8px)}
.glove.v-classic{background:var(--red)}
.glove.v-gold{background:linear-gradient(160deg,#FFE07A,var(--yellow),#B8861C)}
.glove.v-cyber{background:linear-gradient(160deg,#1F3FE0,var(--cyan))}
.glove.v-leather{background:linear-gradient(160deg,#6E3A1F,#3D1F08)}
.glove.v-toxic{background:linear-gradient(160deg,#5BFF8E,var(--green) 60%,#1FA040)}

/* NPC / character */
.npc{position:relative;filter:drop-shadow(0 8px 0 rgba(0,0,0,.5));transform-origin:50% 100%}
.npc.shk,.npc.shake{animation:shk .35s}
.npc.hit{animation:hit-flash .2s}
.npc.ko{animation:nko .6s ease-in forwards}
.npc.enr{animation:enr .4s cubic-bezier(.2,1.4,.6,1)}
.npc.enl{animation:enl .4s cubic-bezier(.2,1.4,.6,1)}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-4deg)}60%{transform:translateX(8px) rotate(4deg)}}
@keyframes hit-flash{50%{filter:drop-shadow(0 8px 0 rgba(0,0,0,.5)) brightness(2.5) saturate(0)}}
@keyframes nko{0%{transform:rotate(0) translateX(0)}25%{transform:rotate(-14deg) translateX(-10px)}65%{transform:rotate(-82deg) translateX(-55px) translateY(28px)}100%{transform:rotate(-94deg) translateX(-90px) translateY(50px);opacity:0}}
@keyframes enr{from{transform:translateX(160px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes enl{from{transform:translateX(-160px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Impact / KO text */
.impact{font-family:var(--font-pixel);font-size:36px;color:var(--yellow);-webkit-text-stroke:3px var(--ink);text-shadow:4px 4px 0 var(--red);letter-spacing:2px;display:inline-block}
.ko-banner{font-family:var(--font-pixel);font-size:84px;color:var(--yellow);-webkit-text-stroke:5px var(--ink);text-shadow:0 0 28px rgba(255,45,92,.6),6px 6px 0 var(--red);letter-spacing:8px;line-height:1}

/* Stat cards */
.stat-card{background:var(--ink-2);border:4px solid var(--paper);padding:14px 16px;box-shadow:var(--shadow);border-radius:2px;position:relative}
.stat-num{font-family:var(--font-pixel);font-size:36px;line-height:1;color:var(--yellow)}
.stat-label{font-family:var(--font-pixel);font-size:9px;color:var(--paper);opacity:.7;margin-top:8px;letter-spacing:1px;text-transform:uppercase}
.crt::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 2px,transparent 2px 4px);z-index:50}

/* Utilities */
.row{display:flex}.col{display:flex;flex-direction:column}.center{display:flex;align-items:center;justify-content:center}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}.gap-8{gap:32px}

/* ── Game layout ── */
body{display:flex;align-items:stretch;justify-content:stretch;min-height:100vh;overflow:hidden}
#game{width:100vw;height:100vh;min-height:100vh;overflow:hidden;cursor:crosshair;position:relative;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}

/* HUD */
#hud{display:none;justify-content:space-between;align-items:center;padding:10px 112px 10px 18px;background:var(--ink-2);border-bottom:3px solid var(--paper);flex-shrink:0;position:relative;z-index:5}
#hud-ko{display:flex;align-items:center;gap:8px}
#hud-right{display:flex;align-items:center;gap:12px}
#td{font-family:var(--font-pixel);font-size:22px;font-weight:900;color:var(--yellow);font-variant-numeric:tabular-nums;min-width:36px;text-align:center;transition:color .2s;text-shadow:2px 2px 0 var(--ink)}
#td.urg{color:var(--red);animation:tpulse .45s infinite alternate}
@keyframes tpulse{from{opacity:1}to{opacity:.5}}
#kos{font-family:var(--font-pixel);font-size:14px;color:var(--red)}
#sc{font-family:var(--font-pixel);font-size:14px;color:var(--yellow)}

/* Timer bar */
#tbw{display:none;flex-shrink:0}
#tb{transition:width .1s linear}

/* Lang switch */
.lang-switch{position:absolute;top:14px;right:16px;z-index:40;padding:6px 10px;background:var(--ink-3);color:var(--paper);border:2px solid var(--paper);border-radius:2px;font-family:var(--font-pixel);font-size:9px;font-weight:700;text-decoration:none;line-height:1;letter-spacing:.5px}
.lang-switch:hover{background:var(--ink-2)}
#stopbtn{display:none;padding:6px 10px;background:var(--ink-3);color:var(--paper);border:2px solid var(--paper);border-radius:2px;font-family:var(--font-pixel);font-size:9px;font-weight:700;cursor:pointer;line-height:1}
#stopbtn:hover{background:var(--ink-2)}

/* Arena */
#arena{flex:1;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:14px 16px 0;position:relative;min-height:320px;overflow:visible}
#bub{background:var(--paper);color:var(--ink);border:4px solid var(--paper);box-shadow:var(--shadow);padding:12px 18px;width:min(100%,960px);text-align:center;position:relative;margin-bottom:22px;min-height:70px;border-radius:2px;transition:opacity .2s,transform .2s}
#bub::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:repeating-linear-gradient(90deg,var(--ink) 0 6px,transparent 6px 12px)}
#bub::after{content:"";position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:16px solid var(--paper)}
#bub.hide{opacity:0;transform:translateY(-8px);pointer-events:none}
#qt{font-family:var(--font-zh);font-size:13.5px;color:var(--ink);line-height:1.65;font-weight:700;margin-top:6px}
#qs{font-family:var(--font-pixel);font-size:9px;color:var(--ink);opacity:.55;margin-top:6px;letter-spacing:.5px}

#npcstage{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:4px;position:relative;z-index:2}
#hpbar-wrap{width:min(180px,60vw)}
#nname{font-family:var(--font-pixel);font-size:9px;color:var(--yellow);background:var(--ink-2);border:2px solid var(--paper);border-radius:2px;padding:3px 10px;text-align:center;letter-spacing:.5px}

/* NPC wrapper */
#npcw{position:relative;width:140px;height:190px;display:flex;align-items:flex-end;justify-content:center}
#npc{display:flex;flex-direction:column;align-items:center;transform-origin:50% 100%}
/* Ghost head — keeps getBoundingClientRect() working for punch() / getGloveTarget() */
#hd{position:absolute;opacity:0;pointer-events:none;z-index:-1}

/* KO Banner */
#kobanner{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:12;pointer-events:none;white-space:nowrap;font-family:var(--font-pixel)}
#kobanner.go{animation:koban .85s ease-out forwards}
@keyframes koban{0%{transform:translate(-50%,-50%) scale(0) rotate(-12deg)}35%{transform:translate(-50%,-50%) scale(1.3) rotate(6deg)}60%{transform:translate(-50%,-50%) scale(1) rotate(-1deg)}82%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1) translateY(-15px);opacity:0}}

/* Punch word */
#pw{position:absolute;display:none;pointer-events:none;z-index:10;max-width:150px;text-align:center;line-height:.95}
#pw.pop{display:block;animation:ppop .65s ease-out forwards}
@keyframes ppop{0%{opacity:1;transform:scale(.4) rotate(-14deg)}50%{opacity:1;transform:scale(1.3) rotate(6deg)}100%{opacity:0;transform:scale(1.05) rotate(-4deg) translateY(-28px)}}

/* Stars / score pop */
.str{position:absolute;width:11px;height:11px;background:var(--yellow);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);pointer-events:none;z-index:9}
.scp{position:absolute;font-family:var(--font-pixel);font-size:11px;font-weight:700;color:var(--green);pointer-events:none;z-index:15;animation:scf .75s ease-out forwards;white-space:nowrap}
@keyframes scf{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
#fl{position:absolute;inset:0;background:var(--paper);opacity:0;pointer-events:none;z-index:8;transition:opacity .13s}

/* New challenger banner */
.nc-banner{position:absolute;top:130px;right:18px;font-family:var(--font-pixel);font-size:11px;color:var(--yellow);background:var(--red);border:3px solid var(--paper);border-radius:2px;padding:6px 12px;box-shadow:var(--shadow-sm);z-index:11;pointer-events:none;white-space:nowrap;animation:ncb .8s ease-out forwards}
@keyframes ncb{0%{opacity:0;transform:translateX(18px) scale(.8)}35%{opacity:1;transform:translateX(0) scale(1.04)}70%{opacity:1;transform:translateX(0) scale(1)}100%{opacity:0;transform:translateY(-12px) scale(.96)}}

/* Glove area */
#garea{display:none;position:relative;height:140px;flex-shrink:0;pointer-events:none}
.gw{position:absolute;display:flex;flex-direction:column;align-items:center;bottom:0;transition:transform .22s cubic-bezier(.4,0,.2,1)}
#gw-left{left:30px}
#gw-right{right:30px}

/* Screens */
#intro,#ss{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:30;padding:24px}
#intro{display:flex}
.intro-badge{font-family:var(--font-pixel);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--paper);background:var(--red);border:2px solid var(--paper);border-radius:2px;padding:6px 12px;box-shadow:var(--shadow-sm)}
#ititle{font-family:var(--font-zh);font-size:28px;font-weight:900;color:var(--yellow);text-shadow:3px 0 0 var(--red),-3px 0 0 var(--cyan);text-align:center;line-height:1.2}
#gtitle{font-family:var(--font-pixel);font-size:24px;color:var(--yellow);text-shadow:3px 0 0 var(--red),-3px 0 0 var(--cyan);text-align:center;letter-spacing:2px}
.i-sub,.s-sub{font-family:var(--font-zh);font-size:14px;color:var(--paper);text-align:center;line-height:1.75;max-width:360px;opacity:.85}
.intro-grid{display:grid;grid-template-columns:1fr;gap:10px;width:100%;max-width:360px}
.intro-card{background:var(--ink-2);border:3px solid var(--paper);border-radius:2px;padding:12px 14px;text-align:left;box-shadow:var(--shadow-sm)}
.intro-head{font-family:var(--font-pixel);font-size:9px;font-weight:700;color:var(--yellow);margin-bottom:6px;letter-spacing:.5px}
.intro-body{font-family:var(--font-zh);font-size:13px;color:var(--paper);line-height:1.55;opacity:.85}
.rules{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.rule{font-family:var(--font-pixel);font-size:9px;color:var(--paper);background:var(--ink-2);border:2px solid var(--paper);border-radius:2px;padding:4px 10px;letter-spacing:.5px}
#ibtn,#sbtn{padding:14px 32px}
#sbtn-infinite{padding:14px 20px}

/* End screen */
#es{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:13px;z-index:30;padding:22px;overflow-y:auto}
#es.on{display:flex}
.et{font-family:var(--font-pixel);font-size:28px;color:var(--yellow);text-shadow:3px 0 0 var(--red),-3px 0 0 var(--cyan),0 0 18px rgba(255,210,63,.5);letter-spacing:3px}
.estats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;width:100%;max-width:480px}
.sbox{background:var(--ink-2);border:4px solid var(--paper);border-radius:2px;padding:10px 18px;text-align:center;min-width:90px;box-shadow:var(--shadow)}
.snum{font-family:var(--font-pixel);font-size:28px;color:var(--yellow)}
.slbl{font-family:var(--font-pixel);font-size:8px;color:var(--paper);opacity:.6;margin-top:4px;letter-spacing:.5px}
.rating{font-family:var(--font-pixel);font-size:10px;color:var(--yellow);background:var(--ink-2);border:3px solid var(--paper);border-radius:2px;padding:8px 20px;text-align:center;box-shadow:var(--shadow-sm);letter-spacing:1px}
.sh-title{font-family:var(--font-pixel);font-size:9px;color:var(--paper);opacity:.7;letter-spacing:.5px}
.sh-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.shbtn{padding:9px 16px;font-family:var(--font-pixel);font-size:9px;letter-spacing:.5px;border:3px solid var(--paper);border-radius:2px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;line-height:1;white-space:nowrap;box-shadow:var(--shadow-sm)}
.shbtn:disabled{opacity:.55;cursor:wait}
.shbtn.tw{background:var(--ink);color:var(--paper)}
.shbtn.th{background:var(--paper);color:var(--ink)}
.shbtn.dl{background:var(--yellow);color:var(--ink)}
.shbtn:hover{opacity:.85}
#rbtn{padding:10px 28px}
#card-preview-wrap{display:none;margin:0 auto}
#share-card-preview{display:block;height:150px;width:auto;border-radius:2px;box-shadow:var(--shadow);border:3px solid var(--paper);cursor:zoom-in}
#share-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink-2);color:var(--paper);border:2px solid var(--paper);padding:10px 18px;border-radius:2px;font-family:var(--font-pixel);font-size:9px;font-weight:700;z-index:100;pointer-events:none;opacity:0;transition:opacity .3s;max-width:calc(100% - 32px);text-align:center;line-height:1.6;letter-spacing:.5px}
#share-toast.show{opacity:1}
.mode-select{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* Fallen prophets grid */
#fallen-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;width:100%;max-width:400px}
.fallen-cell{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;border-radius:2px;position:relative;transition:opacity .2s}

@media (min-width: 900px){
  .lang-switch{top:20px;right:24px;font-size:10px;padding:8px 12px}
  #hud{padding:18px 148px 18px 32px}
  #hud-right{gap:20px}
  #td{font-size:36px;min-width:64px}
  #kos{font-size:18px}
  #sc{font-size:18px}
  #stopbtn{font-size:10px;padding:8px 12px}
  #arena{padding:28px clamp(42px,6vw,96px) 0}
  #bub{width:min(100%,1180px);padding:22px 34px;min-height:100px;margin-bottom:34px}
  #qt{font-size:24px}
  #qs{font-size:12px;margin-top:8px}
  #npcstage{gap:12px;margin-top:12px}
  #hpbar-wrap{width:min(240px,60vw)}
  #nname{font-size:10px;padding:5px 18px}
  #npcw{width:300px;height:400px;transform:scale(1.9);transform-origin:50% 100%}
  #garea{height:290px}
  #gw-left{left:clamp(44px,8vw,140px)}
  #gw-right{right:clamp(44px,8vw,140px)}
  #pw{font-size:36px;max-width:260px}
  .nc-banner{top:194px;right:clamp(22px,5vw,64px);font-size:12px;padding:10px 18px}
  #intro,#ss,#es{padding:32px}
  #ititle{font-size:42px}
  #gtitle{font-size:36px}
  .i-sub,.s-sub{max-width:680px;font-size:18px}
  .intro-grid{max-width:880px;grid-template-columns:repeat(3,1fr);gap:16px}
  .intro-head{font-size:10px}
  .intro-body{font-size:16px}
  .rule{font-size:10px;padding:8px 16px}

/* ─── Audio Engine ─── */
let actx = null;
function getAC() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function playHit(strength = 1) {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(140 * strength, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    gain.gain.setValueAtTime(0.7, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.2);
    const buf = ac.createBuffer(1, ac.sampleRate * 0.07, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const ns = ac.createBufferSource();
    const nf = ac.createBiquadFilter();
    const ng = ac.createGain();
    nf.type = 'bandpass'; nf.frequency.value = 1800; nf.Q.value = 0.8;
    ng.gain.setValueAtTime(0.5 * strength, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
    ns.buffer = buf;
    ns.connect(nf); nf.connect(ng); ng.connect(ac.destination);
    ns.start(t); ns.stop(t + 0.07);
  } catch(e) {}
}
function playKO() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(28, t + 0.35);
    gain.gain.setValueAtTime(1.0, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.4);
    [0, 0.10, 0.20].forEach((dt, i) => {
      const o2 = ac.createOscillator();
      const g2 = ac.createGain();
      o2.type = 'triangle';
      o2.frequency.value = 520 + i * 180;
      g2.gain.setValueAtTime(0.25, t + dt);
      g2.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.12);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(t + dt); o2.stop(t + dt + 0.15);
    });
    const buf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
    const dd = buf.getChannelData(0);
    for (let i = 0; i < dd.length; i++) dd[i] = (Math.random() * 2 - 1) * (1 - i / dd.length) * 0.3;
    const ns = ac.createBufferSource();
    const nf = ac.createBiquadFilter();
    const ng = ac.createGain();
    nf.type = 'bandpass'; nf.frequency.value = 600; nf.Q.value = 1.2;
    ng.gain.setValueAtTime(0.6, t + 0.05);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    ns.buffer = buf;
    ns.connect(nf); nf.connect(ng); ng.connect(ac.destination);
    ns.start(t + 0.05); ns.stop(t + 0.5);
  } catch(e) {}
}
function playTimeUp() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    [0, 0.15, 0.3, 0.48].forEach((dt, i) => {
      const freqs = [440, 370, 330, 220];
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'square'; o.frequency.value = freqs[i];
      g.gain.setValueAtTime(0.2, t + dt);
      g.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.13);
      o.connect(g); g.connect(ac.destination);
      o.start(t + dt); o.stop(t + dt + 0.15);
    });
  } catch(e) {}
}
function playTickBeep() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'square'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.07);
  } catch(e) {}
}
function playNewChallenger() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    [0,0.09,0.18].forEach((dt,i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'triangle'; o.frequency.value = 330 + i * 110;
      g.gain.setValueAtTime(0.2, t+dt); g.gain.exponentialRampToValueAtTime(0.001, t+dt+0.1);
      o.connect(g); g.connect(ac.destination); o.start(t+dt); o.stop(t+dt+0.12);
    });
  } catch(e){}
}

/* ─── Pixel Character Builder (Vanilla DOM) ─── */
function buildPixelChar(ch, state, scale) {
  const px = scale || 4;
  const skin = ch.skin, suit = ch.suit, hair = ch.hair, accent = ch.accent;
  const ink = '#0E0B1A';
  const hairCells = HAIR_STYLES[ch.id] || HAIR_STYLES.clout;

  const wrap = document.createElement('div');
  wrap.style.cssText = `position:relative;width:${10*px}px;height:${19*px}px`;

  function mkDiv(x, y, color, extra) {
    const d = document.createElement('div');
    d.style.cssText = `position:absolute;left:${x*px}px;top:${y*px}px;width:${px}px;height:${px}px;background:${color};${extra||''}`;
    wrap.appendChild(d);
  }

  // head (6×4, offset x+1, y+1 within grid)
  for (let x = 0; x < 6; x++) for (let y = 1; y < 5; y++) mkDiv(x+1, y+1, skin);
  // hair
  hairCells.forEach(([x,y]) => mkDiv(x+1, y+1, hair));
  // eyes
  if (state === 'ko' || state === 'hit') {
    // X eyes
    [2,5].forEach(ex => {
      const d1 = document.createElement('div');
      d1.style.cssText = `position:absolute;left:${ex*px}px;top:${3*px}px;width:${px*1.5}px;height:${px}px;background:${ink};transform:rotate(45deg)`;
      wrap.appendChild(d1);
      const d2 = document.createElement('div');
      d2.style.cssText = `position:absolute;left:${ex*px}px;top:${3*px}px;width:${px*1.5}px;height:${px}px;background:${ink};transform:rotate(-45deg)`;
      wrap.appendChild(d2);
    });
  } else {
    mkDiv(2, 3, ink); mkDiv(5, 3, ink);
  }
  // mouth
  if (state === 'ko' || state === 'hit') {
    mkDiv(3,5,ink); mkDiv(4,5,ink); mkDiv(3,6,ink); mkDiv(4,6,ink);
  } else if (state === 'hurt') {
    mkDiv(3,5,ink); mkDiv(4,5,ink);
  } else {
    mkDiv(3,5,ink); mkDiv(4,5,ink); mkDiv(5,5,ink);
  }
  // neck
  mkDiv(3,7,skin); mkDiv(4,7,skin);
  // body 8×6
  for (let x=0;x<8;x++) for (let y=0;y<6;y++) mkDiv(x, y+8, suit);
  // collar
  mkDiv(3,8,'#fff'); mkDiv(4,8,'#fff');
  // tie
  for (let y=9;y<=11;y++) { mkDiv(3,y,accent); mkDiv(4,y,accent); }
  // arms
  for (let y=0;y<5;y++) { mkDiv(-1,y+9,suit); mkDiv(8,y+9,suit); }
  // hands
  mkDiv(-1,14,skin); mkDiv(8,14,skin);
  // legs
  for (let y=0;y<4;y++) { mkDiv(2,y+14,ink); mkDiv(5,y+14,ink); }
  // shoes
  for (let x=0;x<3;x++) { mkDiv(x,18,ink); mkDiv(x+5,18,ink); }

  return wrap;
}

function renderNPC(ch, state) {
  const npcEl = document.getElementById('npc');
  // Remove all children except #hd ghost
  while (npcEl.firstChild) npcEl.removeChild(npcEl.firstChild);
  // Re-add #hd ghost
  const hd = document.getElementById('hd') || document.createElement('div');
  hd.id = 'hd';
  npcEl.appendChild(hd);

  const isBig = window.innerWidth >= 900;
  const scale = isBig ? 5 : 3;
  const charEl = buildPixelChar(ch, state, scale);
  npcEl.appendChild(charEl);

  // Position #hd ghost to match head area (head is at x+1,y+1 offset, 6w×4h cells)
  const px = scale;
  hd.style.cssText = `position:absolute;opacity:0;pointer-events:none;z-index:-1;left:${1*px}px;top:${2*px}px;width:${6*px}px;height:${4*px}px`;
}

function buildHPBar(hp, max) {
  const bar = document.getElementById('hpbar-inner');
  if (!bar) return;
  bar.innerHTML = '';
  for (let i = 0; i < max; i++) {
    const seg = document.createElement('div');
    const filled = i < hp;
    const pct = hp / max;
    if (!filled) seg.className = 'hp-seg empty';
    else if (pct <= 0.34) seg.className = 'hp-seg crit';
    else if (pct <= 0.67) seg.className = 'hp-seg warn';
    else seg.className = 'hp-seg';
    bar.appendChild(seg);
  }
}

const GLOVE_VARIANTS = ['v-classic','v-gold','v-cyber','v-leather','v-toxic'];
function applyGloveVariant(ch) {
  const idx = CHARACTERS.findIndex(c => c.id === ch.id);
  const v = GLOVE_VARIANTS[idx % GLOVE_VARIANTS.length];
  ['gl-left','gl-right'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = el.className.replace(/v-\S+/g, '').trim();

/* ─── Glove Targeting ─── */
function getGloveTarget() {
  const npcEl = document.getElementById('hd');
  const gareaEl = document.getElementById('garea');
  const leftGw = document.getElementById('gw-left');
  const rightGw = document.getElementById('gw-right');

  const npcR = npcEl.getBoundingClientRect();
  const gareaR = gareaEl.getBoundingClientRect();
  const leftR = leftGw.getBoundingClientRect();
  const rightR = rightGw.getBoundingClientRect();

  const headCX = npcR.left + npcR.width / 2 - gareaR.left;
  const headCY = npcR.top + npcR.height / 2 - gareaR.top;

  const leftCX = leftR.left + leftR.width / 2 - gareaR.left;
  const leftTopY = leftR.top - gareaR.top;
  const rightCX = rightR.left + rightR.width / 2 - gareaR.left;
  const rightTopY = rightR.top - gareaR.top;

  return {
    left:  { dx: headCX - leftCX  + (Math.random()*16-8), dy: headCY - leftTopY  - 20 },
    right: { dx: headCX - rightCX + (Math.random()*16-8), dy: headCY - rightTopY - 20 },
  };
}

function fireGlove(side) {
  const gw = document.getElementById('gw-' + side);
  const target = getGloveTarget();
  const {dx, dy} = target[side];
  gw.style.transition = 'transform 0.13s cubic-bezier(0.2,0.8,0.3,1)';
  gw.style.transform = `translate(${dx}px, ${dy}px) rotate(${side==='left'?-14:14}deg) scale(1.08)`;
  setTimeout(() => {
    gw.style.transition = 'transform 0.22s cubic-bezier(0.4,0,0.6,1)';
    gw.style.transform = 'translate(0,0) rotate(0deg) scale(1)';
  }, 160);
}

function punch(e) {
  if (GST !== 'playing' || busy) return;
  const now = Date.now();
  if (now - lt < 200) return;
  cb = (lt > 0 && now - lt < 1300) ? Math.min(cb + 1, 10) : 1;
  maxCb = Math.max(maxCb, cb);
  lt = now; busy = true; setTimeout(() => busy = false, 200);

  const punchSide = pt === 0 ? 'left' : 'right';
  fireGlove(punchSide); pt = 1 - pt;

  const npc = document.getElementById('npc');
  npc.classList.remove('shk'); void npc.offsetWidth; npc.classList.add('shk');
  setTimeout(() => npc.classList.remove('shk'), 350);
  setFace('hit');

  const fl = document.getElementById('fl');
  fl.style.opacity = '.28'; setTimeout(() => fl.style.opacity = '0', 110);

  const hitStrength = cb > 3 ? 1.4 : 1.0;
  playHit(hitStrength);

  const pw = document.getElementById('pw');
  pw.textContent = getPunchWords()[Math.floor(Math.random() * getPunchWords().length)];
  const npcR = document.getElementById('hd').getBoundingClientRect();
  const arR = document.getElementById('arena').getBoundingClientRect();
  const pwLeft = punchSide === 'left'
    ? npcR.right - arR.left + 14
    : npcR.left - arR.left - 122;
  pw.style.left = Math.max(10, Math.min(arR.width - 140, pwLeft)) + 'px';
  pw.style.top = Math.max(12, npcR.top - arR.top + 8 + Math.random() * 10) + 'px';
  pw.classList.remove('pop'); void pw.offsetWidth; pw.classList.add('pop');

  spawnStars();

  const pts = 10 * cb; sc += pts; updHUD();
  showPop('+' + pts + (cb > 1 ? ' ×' + cb : ''));

  nHP--;
  updHP();
  if (nHP <= 0) {
    setFace('ko');
    setTimeout(doKO, 80);
  } else {
    setTimeout(() => setFace(nHP === 2 ? 'hurt' : 'bad'), 280);
  }
}

  const ar = document.getElementById('arena'), nr = document.getElementById('npc');

  const cx = nrR.left - arR.left + nrR.width / 2, cy = nrR.top - arR.top + nrR.height / 2;
  for (let i = 0; i < 9; i++) {
    const s = document.createElement('div'); s.className = 'str';
    s.style.cssText = `left:${cx}px;top:${cy}px;position:absolute;transition:all .6s ease-out`;
    ar.appendChild(s);

      s.style.opacity = '0'; s.style.transform = 'scale(0)';
    }));
    setTimeout(() => s.remove(), 650);
  }
}

/* ─── Canvas Share Card ─── */
function resolveCardColor(v) {
  const map = {'#FF2D5C':'#FF2D5C','#FFD23F':'#FFD23F','#00E5FF':'#00E5FF','#39FF6A':'#39FF6A','#F5F1E6':'#F5F1E6','var(--red)':'#FF2D5C','var(--yellow)':'#FFD23F','var(--cyan)':'#00E5FF','var(--green)':'#39FF6A','var(--paper)':'#F5F1E6'};
  return map[v] || v;
}

function drawPixelCharOnCanvas(ctx, ch, state, ox, oy, scale) {
  const px = scale;
  const skin = ch.skin, suit = ch.suit, hair = ch.hair, accent = ch.accent;
  const ink = '#0E0B1A';
  const hairCells = HAIR_STYLES[ch.id] || HAIR_STYLES.clout;

  function cell(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(ox + x*px, oy + y*px, px, px);
  }

  for (let x=0;x<6;x++) for (let y=1;y<5;y++) cell(x+1,y+1,skin);
  hairCells.forEach(([x,y]) => cell(x+1,y+1,hair));

  if (state === 'ko' || state === 'hit') {
    [2,5].forEach(ex => { cell(ex,3,ink); cell(ex+1,3,ink); cell(ex,4,ink); cell(ex+1,4,ink); });
    cell(3,5,ink);cell(4,5,ink);cell(3,6,ink);cell(4,6,ink);
  } else {
    cell(2,3,ink); cell(5,3,ink);
    cell(3,5,ink); cell(4,5,ink); cell(5,5,ink);
  }

  cell(3,7,skin); cell(4,7,skin);
  for (let x=0;x<8;x++) for (let y=0;y<6;y++) cell(x,y+8,suit);
  cell(3,8,'#fff'); cell(4,8,'#fff');
  for (let y=9;y<=11;y++) { cell(3,y,accent); cell(4,y,accent); }
  for (let y=0;y<5;y++) { cell(-1,y+9,suit); cell(8,y+9,suit); }
  cell(-1,14,skin); cell(8,14,skin);
  for (let y=0;y<4;y++) { cell(2,y+14,ink); cell(5,y+14,ink); }
  for (let x=0;x<3;x++) { cell(x,18,ink); cell(x+5,18,ink); }
}

function drawPixelCorner(ctx, x, y, flipX, flipY) {
  ctx.save();
  ctx.translate(x + 14, y + 14);
  ctx.scale(flipX ? -1 : 1, flipY ? -1 : 1);
  ctx.translate(-14, -14);
  ctx.fillStyle = '#FFD23F';
  ctx.fillRect(0, 0, 28, 6);
  ctx.fillRect(0, 0, 6, 28);
  ctx.fillStyle = '#FF2D5C';
  ctx.fillRect(8, 8, 12, 4);
  ctx.fillRect(8, 8, 4, 12);
  ctx.restore();
}

async function buildShareImageBlob() {
  const data = shareCardData.rating_zh ? shareCardData : getShareCardData();
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch(e) {}
  }

  const W = 1080, H = 1350;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  if (!ctx) throw new Error('Canvas unavailable');

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Background
  ctx.fillStyle = '#0E0B1A';
  ctx.fillRect(0, 0, W, H);

  // Radial gradients
  const rg1 = ctx.createRadialGradient(W/2, 0, 0, W/2, 0, H*0.6);
  rg1.addColorStop(0, 'rgba(255,45,92,0.25)'); rg1.addColorStop(1, 'transparent');
  ctx.fillStyle = rg1; ctx.fillRect(0, 0, W, H);
  const rg2 = ctx.createRadialGradient(W/2, H, 0, W/2, H, H*0.6);
  rg2.addColorStop(0, 'rgba(0,229,255,0.18)'); rg2.addColorStop(1, 'transparent');
  ctx.fillStyle = rg2; ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,210,63,0.06)'; ctx.lineWidth = 1;
  for (let x=0;x<=W;x+=40) { ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for (let y=0;y<=H;y+=40) { ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  // Scanlines
  for (let y=0;y<H;y+=4) {
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, y, W, 2);
  }

  // Pixel corners
  drawPixelCorner(ctx, 32, 32, false, false);
  drawPixelCorner(ctx, W-60, 32, true, false);
  drawPixelCorner(ctx, 32, H-60, false, true);
  drawPixelCorner(ctx, W-60, H-60, true, true);

  // HEADER
  const pad = 64;
  // Red badge
  ctx.fillStyle = '#FF2D5C';
  ctx.fillRect(pad, pad, 220, 44);
  ctx.strokeStyle = '#F5F1E6'; ctx.lineWidth = 3;
  ctx.strokeRect(pad, pad, 220, 44);
  ctx.fillStyle = '#F5F1E6';
  ctx.font = '700 14px "Press Start 2P", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('PUNCH AI · v26', pad + 110, pad + 22);
  // SCORE CARD label
  ctx.fillStyle = '#FFD23F';
  ctx.font = '700 12px "Press Start 2P", monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE CARD', pad + 234, pad + 22);
  // Date
  const today = new Date();
  const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  ctx.fillStyle = 'rgba(245,241,230,0.65)';
  ctx.font = '400 16px "Bai Jamjuree", monospace';
  ctx.textAlign = 'right';
  ctx.fillText(dateStr, W - pad, pad + 22);

  // TITLE — K.O. REPORT
  const titleY = pad + 90;
  ctx.font = '700 72px "Press Start 2P", monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#FF2D5C';
  ctx.fillText('K.O. REPORT', pad + 5, titleY);
  ctx.fillStyle = '#00E5FF';
  ctx.fillText('K.O. REPORT', pad - 5, titleY);
  ctx.fillStyle = '#FFD23F';
  ctx.fillText('K.O. REPORT', pad, titleY);
  // subtitle
  const r = getRating(data.ko_count);
  const playerSub = LANG === 'en' ? `PLAYER · 30-Second Beatdown` : `PLAYER · 30 秒擂台戰績結算`;
  ctx.fillStyle = 'rgba(245,241,230,0.85)';
  ctx.font = '700 22px "Noto Sans TC", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(playerSub, pad, titleY + 44);

  // RATING BLOCK
  const rbY = titleY + 80;
  const rbH = 200;
  ctx.fillStyle = 'rgba(38,29,68,0.85)';
  ctx.fillRect(pad, rbY, W - pad*2, rbH);
  ctx.strokeStyle = '#F5F1E6'; ctx.lineWidth = 5;
  ctx.strokeRect(pad, rbY, W - pad*2, rbH);

  const tierColor = resolveCardColor(r.color);
  ctx.fillStyle = tierColor;
  ctx.font = '700 160px "Press Start 2P", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(r.tier, pad + 32, rbY + rbH/2);

  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  const rbTextX = pad + 260;
  ctx.fillStyle = 'rgba(245,241,230,0.55)';
  ctx.font = '700 12px "Press Start 2P", monospace';
  ctx.fillText('BOXER RANK', rbTextX, rbY + 28);
  ctx.fillStyle = tierColor;
  ctx.font = '700 28px "Press Start 2P", monospace';
  ctx.fillText(r.titleEn, rbTextX, rbY + 56);
  ctx.fillStyle = '#F5F1E6';
  ctx.font = '900 52px "Noto Sans TC", sans-serif';
  ctx.fillText(r.titleZh, rbTextX, rbY + 96);
  ctx.fillStyle = 'rgba(245,241,230,0.8)';
  ctx.font = '700 20px "Noto Sans TC", sans-serif';
  ctx.fillText(r.subZh, rbTextX, rbY + 158);

  // STAT CELLS
  const statY = rbY + rbH + 26;
  const statH = 130;
  const statW = (W - pad*2 - 36) / 3;
  const stats = [
    { label: LANG==='en'?'KNOCKOUTS':'KO 人數', sub:'KNOCKOUTS', value: String(data.ko_count)+' / 12', color:'#FF2D5C' },
    { label: LANG==='en'?'SCORE':'總得分',      sub:'TOTAL SCORE', value: Number(data.score).toLocaleString(), color:'#FFD23F' },
    { label: LANG==='en'?'BEST COMBO':'最高連擊', sub:'BEST COMBO', value: '×'+data.best_combo, color:'#00E5FF' },
  ];
  stats.forEach((st, i) => {
    const sx = pad + i * (statW + 18);
    // Box
    const lg = ctx.createLinearGradient(sx, statY, sx, statY+statH);
    lg.addColorStop(0,'#1A1530'); lg.addColorStop(1,'#0E0B1A');
    ctx.fillStyle = lg; ctx.fillRect(sx, statY, statW, statH);
    ctx.strokeStyle = '#F5F1E6'; ctx.lineWidth = 4;
    ctx.strokeRect(sx, statY, statW, statH);
    // Label
    ctx.fillStyle = 'rgba(245,241,230,0.75)';
    ctx.font = '700 15px "Noto Sans TC", sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(st.label, sx+16, statY+14);
    // Value
    ctx.fillStyle = st.color;
    ctx.font = '700 44px "Press Start 2P", monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    // fit long values
    let vfont = 44;
    while (vfont > 20 && ctx.measureText(st.value).width > statW - 32) vfont -= 4;
    ctx.font = `700 ${vfont}px "Press Start 2P", monospace`;
    ctx.fillText(st.value, sx+16, statY+38);
    // Sub
    ctx.fillStyle = 'rgba(245,241,230,0.5)';
    ctx.font = '700 9px "Press Start 2P", monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(st.sub, sx+16, statY+statH-24);
  });

  // SECONDARY ROW (TIME / ACCURACY / POWER)
  const secY = statY + statH + 18;
  const secH = 52;
  ctx.fillStyle = 'rgba(14,11,26,0.5)';
  ctx.fillRect(pad, secY, W-pad*2, secH);
  ctx.strokeStyle = 'rgba(245,241,230,0.2)'; ctx.lineWidth = 3;
  ctx.strokeRect(pad, secY, W-pad*2, secH);

  const accuracy = Math.min(99, 60 + data.ko_count * 4);
  const power = data.ko_count > 0 ? Math.round(data.score / data.ko_count) : 0;
  const secItems = [
    {label:'TIME', value: gameMode==='infinite'?'∞':'00:30', color:'#FFD23F'},
    {label:'ACCURACY', value: accuracy+'%', color:'#39FF6A'},
    {label:'POWER', value: String(power)+' pts/KO', color:'#FF4FD8'},
  ];
  const secW = (W-pad*2)/3;
  secItems.forEach((it, i) => {
    const sx = pad + i*secW + secW/2;
    ctx.fillStyle = 'rgba(245,241,230,0.55)';
    ctx.font = '400 12px "Bai Jamjuree", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(it.label, sx, secY+16);
    ctx.fillStyle = it.color;
    ctx.font = '700 18px "Bai Jamjuree", monospace';
    ctx.fillText(it.value, sx, secY+36);
  });
  // Dividers
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
  [1,2].forEach(n => {
    const dx = pad + n*secW;
    ctx.beginPath(); ctx.moveTo(dx, secY+10); ctx.lineTo(dx, secY+secH-10); ctx.stroke();
  });

  // DEFEATED ROSTER
  const rosterY = secY + secH + 22;
  ctx.fillStyle = '#FFD23F';
  ctx.font = '700 13px "Press Start 2P", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('DEFEATED PROPHETS', pad, rosterY);
  ctx.fillStyle = 'rgba(245,241,230,0.55)';
  ctx.font = '400 13px "Bai Jamjuree", monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`${data.ko_count} / 12 down`, W-pad, rosterY+2);

  const gridY = rosterY + 28;
  const cols = 6;
  const cellGap = 10;
  const cellW = (W - pad*2 - cellGap*(cols-1)) / cols;
  const cellH = cellW * 1.5;

  CHARACTERS.forEach((ch, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = pad + col*(cellW+cellGap);
    const cy = gridY + row*(cellH+cellGap);
    const dead = kodList.includes(i);

    ctx.globalAlpha = dead ? 1 : 0.3;
    ctx.fillStyle = dead ? 'rgba(38,29,68,0.9)' : 'rgba(14,11,26,0.6)';
    ctx.fillRect(cx, cy, cellW, cellH);
    ctx.strokeStyle = dead ? '#FF2D5C' : 'rgba(245,241,230,0.15)';
    ctx.lineWidth = 3;
    ctx.strokeRect(cx, cy, cellW, cellH);

    const charScale = Math.floor(cellW / 12);
    const charW = 10 * charScale, charH = 19 * charScale;
    const charX = cx + (cellW - charW) / 2;
    const charY = cy + (cellH - charH - 20) / 2;
    drawPixelCharOnCanvas(ctx, ch, dead?'ko':'idle', charX, charY, charScale);

    if (dead) {
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#FF2D5C';
      ctx.fillRect(cx+cellW-26, cy+4, 22, 14);
      ctx.fillStyle = '#F5F1E6';
      ctx.font = '700 7px "Press Start 2P", monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('KO', cx+cellW-15, cy+11);
    }

    ctx.globalAlpha = dead ? 1 : 0.3;
    ctx.fillStyle = '#F5F1E6';
    ctx.font = `700 ${Math.max(10, Math.floor(cellW/8))}px "Noto Sans TC", sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(ch.name, cx+cellW/2, cy+cellH-4);
  });
  ctx.globalAlpha = 1;

  // FOOTER
  const footerY = gridY + 2*(cellH+cellGap) + 18;
  ctx.strokeStyle = 'rgba(255,210,63,0.4)'; ctx.lineWidth = 3;
  ctx.setLineDash([8,6]);
  ctx.beginPath(); ctx.moveTo(pad, footerY); ctx.lineTo(W-pad, footerY); ctx.stroke();
  ctx.setLineDash([]);

  const fy = footerY + 16;
  // ! badge
  ctx.fillStyle = '#FF2D5C';
  ctx.fillRect(pad, fy, 38, 38);
  ctx.strokeStyle = '#F5F1E6'; ctx.lineWidth = 3;
  ctx.strokeRect(pad, fy, 38, 38);
  ctx.fillStyle = '#F5F1E6';
  ctx.font = '700 18px "Press Start 2P", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('!', pad+19, fy+19);
  // Hashtags + URL
  ctx.fillStyle = '#FFD23F';
  ctx.font = '700 13px "Press Start 2P", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(ui('hashtags'), pad+52, fy+2);
  ctx.fillStyle = 'rgba(245,241,230,0.55)';
  ctx.font = '400 12px "Bai Jamjuree", monospace';
  ctx.fillText('frisk0316.github.io/punch_AI_prophet', pad+52, fy+22);
  // 1 CREDIT
  ctx.fillStyle = 'rgba(245,241,230,0.8)';
  ctx.font = '700 13px "Press Start 2P", monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillText('1 CREDIT', W-pad, fy+19);

  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if (!blob) { reject(new Error('Failed to generate share image.')); return; }
      resolve(blob);
    }, 'image/jpeg', 0.92);
  });
}

/* ─── Share Infrastructure ─── */
function getShareFont(size, weight = 700, latinOnly = false) {
  if (latinOnly) return `${weight} ${size}px "Arial Black", Arial, sans-serif`;
  return `${weight} ${size}px "Noto Sans TC", Arial, sans-serif`;
}

function fitText(ctx, text, { maxWidth, maxFontSize, minFontSize, fontFactory }) {
  const safeText = text == null ? '' : String(text);
  for (let size = maxFontSize; size >= minFontSize; size -= 2) {
    ctx.font = fontFactory(size);
    if (ctx.measureText(safeText).width <= maxWidth) return size;
  }
  return minFontSize;
}

function wrapText(ctx, text, maxWidth) {
  if (!text) return [''];
  if (/\s/.test(text) && !/[\u3400-\u9fff]/.test(text)) {
    const words = text.split(/\s+/);
    const lines = [];
    let current = '';
    words.forEach(word => {
      const next = current ? `${current} ${word}` : word;
      if (current && ctx.measureText(next).width > maxWidth) { lines.push(current); current = word; }
      else current = next;
    });
    if (current) lines.push(current);
    return lines;
  }
  const chars = [...text];
  const lines = [];
  let current = '';
  chars.forEach(ch => {
    const next = current + ch;
    if (current && ctx.measureText(next).width > maxWidth) { lines.push(current); current = ch; }
    else current = next;
  });
  if (current) lines.push(current);
  return lines;
}

function setShareButtonsBusy(isBusy) {
  ['dlbtn','twbtn','thbtn'].forEach(id => { document.getElementById(id).disabled = isBusy; });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function getShareFilename() {
  return `${LANG === 'en' ? 'punch-ai-quotes' : '扁AI語錄'}-${koC}ko-${sc}pts.jpg`;
}

async function prepareShareCard() {
  shareCardBlob = null;
  shareCardFilename = getShareFilename();
  shareCardPromise = buildShareImageBlob()
    .then(blob => { shareCardBlob = blob; return blob; })
    .catch(err => { shareCardBlob = null; throw err; });

  const dlbtn = document.getElementById('dlbtn');
  setShareButtonsBusy(true);
  dlbtn.textContent = ui('sharePreparing');
  try {
    const blob = await shareCardPromise;
    const previewWrap = document.getElementById('card-preview-wrap');
    const previewImg = document.getElementById('share-card-preview');
    if (previewImg && blob) {
      if (previewImg._previewUrl) URL.revokeObjectURL(previewImg._previewUrl);
      const url = URL.createObjectURL(blob);
      previewImg._previewUrl = url;
      previewImg.src = url;
      previewWrap.style.display = 'block';
    }
  } catch (err) {
    console.error(err);
  } finally {
    dlbtn.textContent = ui('downloadJpg');
    setShareButtonsBusy(false);
  }
}

async function ensureShareCardReady() {
  if (shareCardBlob) return shareCardBlob;
  if (!shareCardPromise) {
    shareCardFilename = getShareFilename();
    shareCardPromise = buildShareImageBlob().then(blob => { shareCardBlob = blob; return blob; });
  }
  return shareCardPromise;
}

async function downloadShareCard() {
  const btn = document.getElementById('dlbtn');
  btn.disabled = true;
  btn.textContent = ui('sharePreparing');
  try {
    const blob = await ensureShareCardReady();
    downloadBlob(blob, shareCardFilename || getShareFilename());
    btn.textContent = ui('shareReady');
    setTimeout(() => { btn.textContent = ui('downloadJpg'); btn.disabled = false; }, 1200);
    return;
  } catch (err) { console.error(err); }
  btn.textContent = ui('downloadJpg');
  btn.disabled = false;
}

function getComposerUrl(platform) {
  const text = getTxt();
  if (platform === 'threads') return 'https://www.threads.net/intent/post?text=' + encodeURIComponent(text);
  return 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
}

async function shareSocial(platform) {
  const btn = document.getElementById(platform === 'threads' ? 'thbtn' : 'twbtn');
  const originalLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = ui('sharePreparing');

  try {
    const blob = await ensureShareCardReady();
    const filename = shareCardFilename || getShareFilename();
    const file = typeof File === 'function' ? new File([blob], filename, {type:'image/jpeg'}) : null;

    if (file && navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
      await navigator.share({ files:[file], text:getTxt(), title:ui('startTitle') });
      return;
    }

    let imageSaved = false;
    if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
      try {
        await navigator.clipboard.write([new ClipboardItem({'image/jpeg': blob})]);
        imageSaved = 'copied';
      } catch (e) {}
    }
    if (!imageSaved) {
      downloadBlob(blob, filename);
      imageSaved = 'downloaded';
    }

    window.open(getComposerUrl(platform), '_blank');
    showShareToast(ui(imageSaved === 'copied' ? 'imageCopied' : 'imageDownloaded'));
  } catch (err) {
    if (err && err.name === 'AbortError') return;
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = originalLabel;
  }
}

function showShareToast(msg) {
  const toast = document.getElementById('share-toast');
  if (!toast) return;
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._hideTimer);
  toast._hideTimer = setTimeout(() => toast.classList.remove('show'), 4000);
}

function shareX() { shareSocial('x'); }
function shareThreads() { shareSocial('threads'); }

function resetGame(e) {
  e.stopPropagation();
  startGame(gameMode);
}

applyLanguage();
document.documentElement.dataset.build = BUILD_ID;
window.__PUNCH_AI_QUOTES_BUILD__ = BUILD_ID;
console.info('[Punch AI Quotes] build', BUILD_ID);
