<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Share Card Preview</title>
  <style>
    html, body {
      margin: 0;
      background: #f7efe1;
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px 16px;
      min-height: 100vh;
    }

    h1 {
      font-size: 16px;
      font-weight: 800;
      color: #3D1F08;
      margin: 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
      background: #fff;
      border: 2px solid #BA7517;
      border-radius: 10px;
      padding: 12px 16px;
      width: 100%;
      max-width: 620px;
    }

    .controls label {
      font-size: 12px;
      font-weight: 700;
      color: #3D1F08;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .controls input[type="number"] {
      width: 80px;
      padding: 5px 8px;
      border: 2px solid #BA7517;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .controls select {
      padding: 5px 8px;
      border: 2px solid #BA7517;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    button#refresh {
      padding: 8px 20px;
      background: #D85A30;
      color: #fff;
      border: 2px solid #3D1F08;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      margin-left: auto;
    }

    button#refresh:hover { background: #993C1D; }
    button#refresh:disabled { opacity: .5; cursor: wait; }

    #status {
      font-size: 13px;
      color: #888780;
      font-weight: 600;
    }

    img#preview {
      display: block;
      width: 362px;
      height: 483px;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(61,31,8,.22);
      border: 3px solid #BA7517;
      background: #e8ddd0;
    }

    iframe {
      position: fixed;
      width: 0;
      height: 0;
      border: 0;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>圖卡預覽工具 / Share Card Preview</h1>

  <div class="controls">
    <label>KO 數<input type="number" id="inp-ko" value="6" min="0" max="30"></label>
    <label>得分<input type="number" id="inp-sc" value="1980" min="0" max="99999"></label>
    <label>最高連擊<input type="number" id="inp-cb" value="8" min="1" max="99"></label>
    <label>語言
      <select id="inp-lang">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </label>
    <button id="refresh">重新產生</button>
  </div>

  <div id="status">載入中…</div>
  <img id="preview" alt="share card preview">
  <iframe id="app-frame"></iframe>

  <script>
    const GAME_PATH = './扁AI語錄遊戲.html';
    let currentLang = 'zh';

    function frameUrl(lang) {
      return `${GAME_PATH}?lang=${lang}`;
    }

    function loadFrame(lang) {
      return new Promise((resolve, reject) => {
        const frame = document.getElementById('app-frame');
        frame.onload = () => resolve(frame.contentWindow);
        frame.onerror = () => reject(new Error('無法載入遊戲 iframe。'));
        frame.src = frameUrl(lang);
      });
    }

    async function render() {
      const ko  = parseInt(document.getElementById('inp-ko').value)  || 0;
      const sc  = parseInt(document.getElementById('inp-sc').value)  || 0;
      const cb  = parseInt(document.getElementById('inp-cb').value)  || 1;
      const lang = document.getElementById('inp-lang').value;
      const status  = document.getElementById('status');
      const img     = document.getElementById('preview');
      const btn     = document.getElementById('refresh');

      btn.disabled = true;
      status.textContent = lang !== currentLang ? '重新載入語言版本…' : '產生中…';

      try {
        let app;
        if (lang !== currentLang) {
          currentLang = lang;
          app = await loadFrame(lang);
          // Wait for fonts in the iframe
          try { await app.document.fonts.ready; } catch(e) {}
        } else {
          app = document.getElementById('app-frame').contentWindow;
        }

        app.eval(`
          koC = ${ko};
          sc = ${sc};
          maxCb = ${cb};
          shareCardData = getShareCardData();
        `);

        status.textContent = '產生圖卡中…';
        const blob = await app.buildShareImageBlob();

        if (img._previewUrl) URL.revokeObjectURL(img._previewUrl);
        const url = URL.createObjectURL(blob);
        img._previewUrl = url;
        img.onload = () => {
          status.textContent = '預覽就緒';
          document.title = 'ready';
        };
        img.src = url;
      } catch (err) {
        status.textContent = '錯誤：' + err.message;
        document.title = 'error';
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }

    async function boot() {
      document.getElementById('refresh').addEventListener('click', render);
      document.getElementById('inp-lang').addEventListener('change', render);

      const app = await loadFrame('zh');
      try { await app.document.fonts.ready; } catch(e) {}
      await render();
    }

    boot().catch(err => {
      document.getElementById('status').textContent = '錯誤：' + err.message;
      document.title = 'error';
      console.error(err);
    });
  </script>
</body>
</html>
